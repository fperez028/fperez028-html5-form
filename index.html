<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>HTML5 Form</title>
</head>
<body class="mx-auto p-3" style="width: 1000px;">
  <form action="">
    <div class="card" style="width: 100%; height: 600px; font-weight: 500;">
      <div class="card-header" style="font-weight: 600; font-size:large">
        Payment form example
      </div>
      <div class="card-body text-start">
        <div class="row my-3">
          <div class="col-4">
            <label class="mb-2" for="creditCardNumber">Card #</label>
            <input type="text" name="creditCardNumber" class="form-control" placeholder="XXXXXXXXXXXXXXXX" aria-label="creditCardNumber" required/>
          </div>
          <div class="col-4">
            <label class="mb-2" for="cvcNumber">CVC #</label>
            <input type="text" name="cvcNumber" class="form-control" placeholder="0000" aria-label="cvcNumber" required/>
          </div>
          <div class="col-4">
            <label class="mb-2" for="amount">Amount</label>
            <div class="d-flex">
              <i class="fa-solid fa-dollar-sign"></i>
              <input type="text" name="amount" class="form-control" placeholder="Amount" aria-label="amount" required />
            </div>
          </div>
        </div>
        <div class="row my-3">
          <div class="col-6">
            <label class="mb-2" for="firstName">First Name</label>
            <input type="text" name="firstName" class="form-control" aria-label="First name" required/>
          </div>
          <div class="col-6">
            <label class="mb-2" for="lastName">Last Name</label>
            <input type="text" name="lastName" class="form-control" aria-label="Last name" required/>
          </div>
        </div>
        <div class="row my-3">
          <div class="col-6">
            <label class="mb-2" for="city">City</label>
            <input type="text" name="city" class="form-control" aria-label="city" required/>
          </div>
          <div class="col-3">
            <label class="mb-2" for="State">State</label>
            <input type="text" name="state" class="form-control" aria-label="cvcNumber" required/>
          </div>
          <div class="col-3">
            <label class="mb-2" for="postalCode">Postal Code</label>
            <input type="text" name="postalCode" class="form-control" aria-label="amount" required/>
          </div>
        </div>
        <div class="row my-3">
          <div class="col-6">
            <label class="mb-2" for="inlineRadioOptions">We accept:</label>
            <div class="rounded p-2 d-flex justify-content-center" style="width: 55%; background-color: darkgrey;">
              <div class="form-check form-check-inline me-2">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
                <label class="form-check-label" for="inlineRadio1"><i class="fa-brands fa-cc-mastercard"></i></label>
              </div>
              <div class="form-check form-check-inline me-2">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
                <label class="form-check-label" for="inlineRadio2"><i class="fa-brands fa-cc-visa"></i></label>
              </div>
              <div class="form-check form-check-inline me-2">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio3" value="option3">
                <label class="form-check-label" for="inlineRadio3"><i class="fa-brands fa-cc-diners-club"></i></label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio4" value="option4">
                <label class="form-check-label" for="inlineRadio4"><i class="fa-brands fa-cc-amex"></i></label>
              </div>
            </div> 
          </div>
          <div class="col-6">
            <label for="exampleFormControlTextarea1" class="form-label">Message</label>
            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
            <p style="color:gray; font-size: small;">Add any notes here.</p>
          </div> 
        </div>
      </div>
      <div class="card-footer text-end">
        <button type="button" class="btn btn-secondary">Cancel</button>
        <button type="button" class="btn btn-primary">Send</button>
      </div>
    </div>
  </form>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/974b0d5db8.js" crossorigin="anonymous"></script>
</body>
</html>
